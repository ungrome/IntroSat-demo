<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introsat 3D - Three.js Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #canvas { 
            display: block; 
            width: 100%;
            height: 600px;
        }
        .controls {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            padding: 10px 20px;
            background: #00d4ff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        button:hover { background: #00a8cc; transform: scale(1.05); }
        button.active { background: #ff6b6b; }
        .info {
            background: rgba(0, 0, 0, 0.7);
            color: #00ff00;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            height: 120px;
            overflow-y: auto;
        }
        h1 {
            text-align: center;
            color: white;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <h1>🛰️ Introsat CubeSat 3D Visualizer</h1>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <button onclick="showComponent('bluepill')">BluePill</button>
        <button onclick="showComponent('cubesat')">CubeSat</button>
        <button onclick="showComponent('gyro')">Гироскоп</button>
        <button onclick="showComponent('camera')">Камера</button>
        <button onclick="showComponent('radio')">Радиомодуль</button>
        <button onclick="toggleAnimation()">Анимация</button>
        <button onclick="resetView()">Сброс</button>
    </div>
    <div class="info" id="info">
        Выберите компонент для просмотра...
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Инициализация сцены
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        scene.fog = new THREE.Fog(0x1a1a2e, 100, 1000);

        const canvas = document.getElementById('canvas');
        const camera = new THREE.PerspectiveCamera(75, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(canvas.clientWidth, canvas.clientHeight);
        renderer.shadowMap.enabled = true;

        // Освещение
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 7);
        directionalLight.castShadow = true;
        scene.add(directionalLight);

        const pointLight = new THREE.PointLight(0x00d4ff, 0.5);
        pointLight.position.set(-5, 5, 5);
        scene.add(pointLight);

        let currentComponent = null;
        let isAnimating = false;

        // Функция создания BluePill
        function createBluePill() {
            const group = new THREE.Group();

            // Основная плата
            const boardGeometry = new THREE.BoxGeometry(3, 1.5, 0.1);
            const boardMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x1a1a3e,
                metalness: 0.3,
                roughness: 0.7
            });
            const board = new THREE.Mesh(boardGeometry, boardMaterial);
            board.castShadow = true;
            board.receiveShadow = true;
            group.add(board);

            // Микроконтроллер (чёрный чип)
            const chipGeometry = new THREE.BoxGeometry(0.8, 0.8, 0.15);
            const chipMaterial = new THREE.MeshStandardMaterial({ color: 0x000000 });
            const chip = new THREE.Mesh(chipGeometry, chipMaterial);
            chip.position.z = 0.1;
            chip.castShadow = true;
            group.add(chip);

            // Пины
            for (let i = 0; i < 20; i++) {
                const pinGeometry = new THREE.CylinderGeometry(0.05, 0.05, 0.3, 8);
                const pinMaterial = new THREE.MeshStandardMaterial({ 
                    color: 0xffd700,
                    metalness: 0.8
                });
                const pin = new THREE.Mesh(pinGeometry, pinMaterial);
                pin.position.x = -1.4 + (i % 10) * 0.3;
                pin.position.y = i < 10 ? 0.8 : -0.8;
                pin.position.z = -0.2;
                pin.castShadow = true;
                group.add(pin);
            }

            // Кристалл (резонатор)
            const crystalGeometry = new THREE.BoxGeometry(0.4, 0.3, 0.15);
            const crystalMaterial = new THREE.MeshStandardMaterial({ color: 0x888888 });
            const crystal = new THREE.Mesh(crystalGeometry, crystalMaterial);
            crystal.position.set(1.2, 0.5, 0.1);
            crystal.castShadow = true;
            group.add(crystal);

            return group;
        }

        // Функция создания CubeSat
        function createCubeSat() {
            const group = new THREE.Group();

            // Корпус (куб 1U)
            const bodyGeometry = new THREE.BoxGeometry(1, 1, 1);
            const bodyMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x2a2a4a,
                metalness: 0.4,
                roughness: 0.6
            });
            const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
            body.castShadow = true;
            body.receiveShadow = true;
            group.add(body);

            // Солнечные панели
            const panelGeometry = new THREE.PlaneGeometry(1.2, 1);
            const panelMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x1a5f7a,
                metalness: 0.6,
                emissive: 0x0088ff,
                emissiveIntensity: 0.2
            });

            const positions = [
                [0.6, 0, 0],
                [-0.6, 0, 0],
                [0, 0.6, 0],
                [0, -0.6, 0]
            ];

            positions.forEach(pos => {
                const panel = new THREE.Mesh(panelGeometry, panelMaterial);
                panel.position.set(...pos);
                panel.castShadow = true;
                group.add(panel);
            });

            // Антенна
            const antennaGeometry = new THREE.CylinderGeometry(0.05, 0.05, 0.8, 8);
            const antennaMaterial = new THREE.MeshStandardMaterial({ color: 0xff6b6b });
            const antenna = new THREE.Mesh(antennaGeometry, antennaMaterial);
            antenna.position.set(0.5, 0.5, 0.5);
            antenna.rotation.z = Math.PI / 4;
            antenna.castShadow = true;
            group.add(antenna);

            return group;
        }

        // Функция создания Гироскопа
        function createGyro() {
            const group = new THREE.Group();

            // Корпус датчика
            const caseGeometry = new THREE.BoxGeometry(0.6, 0.6, 0.6);
            const caseMaterial = new THREE.MeshStandardMaterial({ color: 0x2a2a4a });
            const caseBox = new THREE.Mesh(caseGeometry, caseMaterial);
            caseBox.castShadow = true;
            group.add(caseBox);

            // Оси координат (X, Y, Z)
            const axes = [
                { color: 0xff0000, label: 'X' }, // Red
                { color: 0x00ff00, label: 'Y' }, // Green
                { color: 0x0000ff, label: 'Z' }  // Blue
            ];

            axes.forEach((axis, i) => {
                const axisGeometry = new THREE.CylinderGeometry(0.05, 0.05, 1.5, 8);
                const axisMaterial = new THREE.MeshStandardMaterial({ color: axis.color });
                const axisLine = new THREE.Mesh(axisGeometry, axisMaterial);
                
                if (i === 0) axisLine.rotation.z = Math.PI / 2;
                if (i === 2) axisLine.rotation.x = Math.PI / 2;
                
                axisLine.castShadow = true;
                group.add(axisLine);
            });

            return group;
        }

        // Функция создания Камеры
        function createCamera() {
            const group = new THREE.Group();

            // Линза
            const lensGeometry = new THREE.SphereGeometry(0.3, 32, 32);
            const lensMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x4488ff,
                metalness: 0.5,
                emissive: 0x0066ff,
                emissiveIntensity: 0.3
            });
            const lens = new THREE.Mesh(lensGeometry, lensMaterial);
            lens.castShadow = true;
            group.add(lens);

            // Корпус
            const bodyGeometry = new THREE.CylinderGeometry(0.35, 0.35, 0.5, 32);
            const bodyMaterial = new THREE.MeshStandardMaterial({ color: 0x1a1a3e });
            const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
            body.position.z = -0.3;
            body.castShadow = true;
            group.add(body);

            // Поле зрения (конус)
            const fovGeometry = new THREE.ConeGeometry(2, 3, 32);
            const fovMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x00ff00,
                transparent: true,
                opacity: 0.1,
                wireframe: true
            });
            const fov = new THREE.Mesh(fovGeometry, fovMaterial);
            fov.position.z = 1.5;
            group.add(fov);

            return group;
        }

        // Функция создания Радиомодуля
        function createRadio() {
            const group = new THREE.Group();

            // Плата
            const boardGeometry = new THREE.BoxGeometry(1, 0.6, 0.1);
            const boardMaterial = new THREE.MeshStandardMaterial({ color: 0x2a4a2a });
            const board = new THREE.Mesh(boardGeometry, boardMaterial);
            board.castShadow = true;
            group.add(board);

            // Микросхема
            const chipGeometry = new THREE.BoxGeometry(0.5, 0.4, 0.1);
            const chipMaterial = new THREE.MeshStandardMaterial({ color: 0x000000 });
            const chip = new THREE.Mesh(chipGeometry, chipMaterial);
            chip.position.z = 0.1;
            chip.castShadow = true;
            group.add(chip);

            // Антенна
            const antennaGeometry = new THREE.CylinderGeometry(0.04, 0.04, 1, 8);
            const antennaMaterial = new THREE.MeshStandardMaterial({ 
                color: 0xff6b6b,
                emissive: 0xff3333,
                emissiveIntensity: 0.5
            });
            const antenna = new THREE.Mesh(antennaGeometry, antennaMaterial);
            antenna.position.set(0.4, 0.4, 0.2);
            antenna.rotation.z = Math.PI / 6;
            antenna.castShadow = true;
            group.add(antenna);

            // Радиоволны (анимация)
            for (let i = 0; i < 3; i++) {
                const waveGeometry = new THREE.TorusGeometry(0.5 + i * 0.3, 0.05, 8, 32);
                const waveMaterial = new THREE.MeshStandardMaterial({ 
                    color: 0x00ff00,
                    transparent: true,
                    opacity: 0.3
                });
                const wave = new THREE.Mesh(waveGeometry, waveMaterial);
                wave.position.set(0.4, 0.4, 0.2);
                wave.rotation.x = Math.PI / 4;
                wave.userData.waveIndex = i;
                group.add(wave);
            }

            return group;
        }

        // Функция отображения компонента
        function showComponent(componentName) {
            if (currentComponent) scene.remove(currentComponent);

            let newComponent;
            let info = '';

            switch(componentName) {
                case 'bluepill':
                    newComponent = createBluePill();
                    info = '📱 STM32F103C8T6 BluePill\n' +
                            '• Микроконтроллер: ARM Cortex-M3\n' +
                            '• Частота: 72 МГц\n' +
                            '• ОЗУ: 20 КБ\n' +
                            '• Flash: 64 КБ\n' +
                            '• Пины: 20 GPIO\n' +
                            '• Интерфейсы: UART, SPI, I²C';
                    camera.position.z = 4;
                    break;
                case 'cubesat':
                    newComponent = createCubeSat();
                    info = '🛰️ CubeSat 1U\n' +
                            '• Размер: 10×10×10 см\n' +
                            '• Масса: ~1.3 кг\n' +
                            '• Солнечные панели: 4 шт\n' +
                            '• Антенна: UHF 433 МГц\n' +
                            '• Батарея: Li-Po 2000 мАч\n' +
                            '• Ориентация: 3-осевая';
                    camera.position.z = 3;
                    break;
                case 'gyro':
                    newComponent = createGyro();
                    info = '🔄 IMU Датчик\n' +
                            '• Гироскоп: ±250°/с\n' +
                            '• Акселерометр: ±8g\n' +
                            '• Магнитометр: ±4800 мГс\n' +
                            '• Интерфейс: I²C\n' +
                            '• Частота: 100 Гц\n' +
                            '• Точность: ±1°';
                    camera.position.z = 3;
                    break;
                case 'camera':
                    newComponent = createCamera();
                    info = '📷 Камера OV7670\n' +
                            '• Разрешение: 640×480\n' +
                            '• Угол обзора: 60°\n' +
                            '• Интерфейс: SCCB (I²C)\n' +
                            '• Выход: JPEG/RAW\n' +
                            '• Потребление: 60 мА\n' +
                            '• Фокус: фиксированный';
                    camera.position.z = 2.5;
                    break;
                case 'radio':
                    newComponent = createRadio();
                    info = '📡 Радиомодуль\n' +
                            '• Частота: 433 МГц\n' +
                            '• Мощность: 20 дБм\n' +
                            '• Дальность: ~1 км\n' +
                            '• Скорость: 250 кбит/с\n' +
                            '• Модуляция: FSK\n' +
                            '• Интерфейс: SPI';
                    camera.position.z = 2;
                    break;
            }

            if (newComponent) {
                scene.add(newComponent);
                currentComponent = newComponent;
                document.getElementById('info').textContent = info;
                
                // Подсветка активной кнопки
                document.querySelectorAll('button').forEach(btn => {
                    btn.classList.remove('active');
                });
                event.target.classList.add('active');
            }
        }

        // Функция переключения анимации
        function toggleAnimation() {
            isAnimating = !isAnimating;
            event.target.textContent = isAnimating ? '⏸ Стоп' : '▶ Анимация';
        }

        // Функция сброса вида
        function resetView() {
            camera.position.set(0, 0, 5);
            camera.lookAt(0, 0, 0);
        }

        // Анимационный цикл
        function animate() {
            requestAnimationFrame(animate);

            if (currentComponent && isAnimating) {
                currentComponent.rotation.x += 0.005;
                currentComponent.rotation.y += 0.01;
            }

            // Анимация радиоволн
            if (currentComponent && currentComponent.children) {
                currentComponent.children.forEach(child => {
                    if (child.userData.waveIndex !== undefined) {
                        child.scale.x += 0.02;
                        child.scale.y += 0.02;
                        child.material.opacity -= 0.01;
                        if (child.scale.x > 2) {
                            child.scale.set(1, 1, 1);
                            child.material.opacity = 0.3;
                        }
                    }
                });
            }

            renderer.render(scene, camera);
        }

        // Обработка изменения размера окна
        window.addEventListener('resize', () => {
            camera.aspect = canvas.clientWidth / canvas.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(canvas.clientWidth, canvas.clientHeight);
        });

        // Запуск анимации
        animate();

        // Загрузка первого компонента
        showComponent('bluepill');
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" 
          content="width=device-width, 
                   initial-scale=1.0, 
                   maximum-scale=1.0, 
                   user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Introsat 3D Visualizer</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
        }
        html, body { 
            width: 100%; 
            height: 100%;
            overflow: hidden;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            flex-direction: column;
        }
        h1 {
            text-align: center;
            color: white;
            padding: 10px;
            background: rgba(0, 0, 0, 0.6);
            font-size: 18px;
            margin: 0;
        }
        #canvas { 
            display: block; 
            flex: 1;
            width: 100%;
        }
        .controls {
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            overflow-y: auto;
            max-height: 140px;
        }
        button {
            padding: 12px 10px;
            background: #00d4ff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            transition: all 0.3s;
            touch-action: manipulation;
        }
        button:active { 
            background: #00a8cc; 
            transform: scale(0.95);
        }
        button.active { 
            background: #ff6b6b; 
        }
        .info {
            background: rgba(0, 0, 0, 0.8);
            color: #00ff00;
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            line-height: 1.4;
            max-height: 100px;
            overflow-y: auto;
        }
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: #00ff00;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            font-family: 'Courier New', monospace;
            z-index: 1000;
            display: none;
        }
        .loading.show {
            display: block;
        }
        .spinner {
            border: 4px solid rgba(0, 255, 0, 0.3);
            border-top: 4px solid #00ff00;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @media (max-width: 600px) {
            .controls {
                grid-template-columns: repeat(2, 1fr);
            }
            button {
                font-size: 11px;
                padding: 10px 8px;
            }
        }
    </style>
</head>
<body>
    <h1>🛰️ Introsat CubeSat 3D Visualizer</h1>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <button onclick="showComponent('bluepill')">BluePill</button>
        <button onclick="showComponent('cubesat')">CubeSat</button>
        <button onclick="showComponent('gyro')">Гироскоп</button>
        <button onclick="showComponent('camera')">Камера</button>
        <button onclick="showComponent('radio')">Радио</button>
        <button onclick="showComponent('model')">📦 3D Модель</button>
        <button onclick="toggleAnimation()">Анимация</button>
        <button onclick="resetView()">Сброс</button>
    </div>
    <div class="info" id="info">
        Выберите компонент...
    </div>
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Загрузка 3D модели...</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@r128/examples/js/loaders/GLTFLoader.js"></script>
    <script>
        const canvas = document.getElementById('canvas');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(
            75, 
            canvas.clientWidth / canvas.clientHeight, 
            0.1, 
            1000
        );
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ 
            canvas, 
            antialias: true,
            alpha: true
        });
        renderer.setSize(canvas.clientWidth, canvas.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;

        // Освещение
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 7);
        directionalLight.castShadow = true;
        scene.add(directionalLight);

        const pointLight = new THREE.PointLight(0x00d4ff, 0.5);
        pointLight.position.set(-5, 5, 5);
        scene.add(pointLight);

        let currentComponent = null;
        let isAnimating = false;
        let touchStartX = 0;
        let touchStartY = 0;
        let loadedModel = null;

        // Сенсорное управление
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            if (!currentComponent) return;
            
            const deltaX = e.touches[0].clientX - touchStartX;
            const deltaY = e.touches[0].clientY - touchStartY;
            
            currentComponent.rotation.y += deltaX * 0.01;
            currentComponent.rotation.x += deltaY * 0.01;
            
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        // Загрузка 3D модели
        function loadModel() {
            return new Promise((resolve, reject) => {
                const loader = new THREE.GLTFLoader();
                
                // Путь к модели на GitHub Pages
                const modelPath = 'models/cubesat.glb';
                
                loader.load(
                    modelPath,
                    (gltf) => {
                        const model = gltf.scene;
                        
                        // Масштабирование и позиционирование
                        model.scale.set(1, 1, 1);
                        model.position.set(0, 0, 0);
                        
                        // Включи тени для всех объектов
                        model.traverse((child) => {
                            if (child.isMesh) {
                                child.castShadow = true;
                                child.receiveShadow = true;
                            }
                        });
                        
                        loadedModel = model;
                        resolve(model);
                    },
                    (progress) => {
                        const percentComplete = (progress.loaded / progress.total * 100);
                        console.log(percentComplete + '% loaded');
                    },
                    (error) => {
                        console.error('Ошибка загрузки модели:', error);
                        document.getElementById('info').textContent = 
                            '❌ Ошибка загрузки модели\nПроверь путь: models/cubesat.glb';
                        reject(error);
                    }
                );
            });
        }

        // Создание компонентов
        function createBluePill() {
            const group = new THREE.Group();
            const boardGeometry = new THREE.BoxGeometry(3, 1.5, 0.1);
            const boardMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x1a1a3e,
                metalness: 0.3,
                roughness: 0.7
            });
            const board = new THREE.Mesh(boardGeometry, boardMaterial);
            board.castShadow = true;
            group.add(board);

            const chipGeometry = new THREE.BoxGeometry(0.8, 0.8, 0.15);
            const chipMaterial = new THREE.MeshStandardMaterial({ color: 0x000000 });
            const chip = new THREE.Mesh(chipGeometry, chipMaterial);
            chip.position.z = 0.1;
            chip.castShadow = true;
            group.add(chip);

            for (let i = 0; i < 20; i++) {
                const pinGeometry = new THREE.CylinderGeometry(0.05, 0.05, 0.3, 8);
                const pinMaterial = new THREE.MeshStandardMaterial({ color: 0xffd700 });
                const pin = new THREE.Mesh(pinGeometry, pinMaterial);
                pin.position.x = -1.4 + (i % 10) * 0.3;
                pin.position.y = i < 10 ? 0.8 : -0.8;
                pin.position.z = -0.2;
                pin.castShadow = true;
                group.add(pin);
            }

            return group;
        }

        function createCubeSat() {
            const group = new THREE.Group();
            const bodyGeometry = new THREE.BoxGeometry(1, 1, 1);
            const bodyMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x2a2a4a,
                metalness: 0.4
            });
            const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
            body.castShadow = true;
            group.add(body);

            const panelGeometry = new THREE.PlaneGeometry(1.2, 1);
            const panelMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x1a5f7a,
                emissive: 0x0088ff,
                emissiveIntensity: 0.2
            });

            [[0.6, 0, 0], [-0.6, 0, 0], [0, 0.6, 0], [0, -0.6, 0]].forEach(pos => {
                const panel = new THREE.Mesh(panelGeometry, panelMaterial);
                panel.position.set(...pos);
                panel.castShadow = true;
                group.add(panel);
            });

            return group;
        }

        function createGyro() {
            const group = new THREE.Group();
            const caseGeometry = new THREE.BoxGeometry(0.6, 0.6, 0.6);
            const caseMaterial = new THREE.MeshStandardMaterial({ color: 0x2a2a4a });
            const caseBox = new THREE.Mesh(caseGeometry, caseMaterial);
            caseBox.castShadow = true;
            group.add(caseBox);
            return group;
        }

        function createCamera() {
            const group = new THREE.Group();
            const lensGeometry = new THREE.SphereGeometry(0.3, 32, 32);
            const lensMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x4488ff,
                emissive: 0x0066ff,
                emissiveIntensity: 0.3
            });
            const lens = new THREE.Mesh(lensGeometry, lensMaterial);
            lens.castShadow = true;
            group.add(lens);
            return group;
        }

        function createRadio() {
            const group = new THREE.Group();
            const boardGeometry = new THREE.BoxGeometry(1, 0.6, 0.1);
            const boardMaterial = new THREE.MeshStandardMaterial({ color: 0x2a4a2a });
            const board = new THREE.Mesh(boardGeometry, boardMaterial);
            board.castShadow = true;
            group.add(board);
            return group;
        }

        async function showComponent(componentName) {
            if (currentComponent) scene.remove(currentComponent);

            let newComponent;
            let info = '';

            const components = {
                bluepill: { 
                    create: createBluePill, 
                    z: 4,
                    info: '📱 STM32F103C8T6\n72 МГц, 20 КБ ОЗУ\n64 КБ Flash'
                },
                cubesat: { 
                    create: createCubeSat, 
                    z: 3,
                    info: '🛰️ CubeSat 1U\n10×10×10 см\nСолнечные панели'
                },
                gyro: { 
                    create: createGyro, 
                    z: 3,
                    info: '🔄 IMU Датчик\n±250°/с (гироскоп)\n±8g (акселерометр)'
                },
                camera: { 
                    create: createCamera, 
                    z: 2.5,
                    info: '📷 OV7670\n640×480\n60° угол обзора'
                },
                radio: { 
                    create: createRadio, 
                    z: 2,
                    info: '📡 Радиомодуль\n433 МГц\n~1 км дальность'
                },
                model: {
                    create: null,
                    z: 3,
                    info: '📦 3D Модель CubeSat\nЗагружается...',
                    isModel: true
                }
            };

            if (components[componentName]) {
                const comp = components[componentName];
                
                if (comp.isModel) {
                    // Загрузи 3D модель
                    document.getElementById('loading').classList.add('show');
                    try {
                        newComponent = await loadModel();
                        document.getElementById('loading').classList.remove('show');
                        info = '📦 3D Модель CubeSat\nЗагружена успешно!\nСвайпай для вращения';
                    } catch (error) {
                        document.getElementById('loading').classList.remove('show');
                        info = '❌ Ошибка загрузки\nПроверь models/cubesat.glb';
                        return;
                    }
                } else {
                    newComponent = comp.create();
                    info = comp.info;
                }
                
                camera.position.z = comp.z;
            }

            if (newComponent) {
                scene.add(newComponent);
                currentComponent = newComponent;
                document.getElementById('info').textContent = info;
            }
        }

        function toggleAnimation() {
            isAnimating = !isAnimating;
            event.target.textContent = isAnimating ? '⏸ Стоп' : '▶ Анимация';
        }

        function resetView() {
            camera.position.set(0, 0, 5);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (currentComponent && isAnimating) {
                currentComponent.rotation.x += 0.005;
                currentComponent.rotation.y += 0.01;
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = canvas.clientWidth / canvas.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(canvas.clientWidth, canvas.clientHeight);
        });

        animate();
        showComponent('bluepill');
    </script>
</body>
</html>
